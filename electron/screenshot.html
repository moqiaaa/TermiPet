<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; cursor: crosshair; user-select: none; }
canvas { position: absolute; top: 0; left: 0; }
.toolbar {
  display: none;
  position: absolute;
  padding: 4px;
  background: rgba(0,0,0,0.75);
  border-radius: 6px;
  gap: 4px;
  z-index: 10;
}
.toolbar button {
  padding: 6px 16px;
  border: none;
  border-radius: 4px;
  font-size: 13px;
  cursor: pointer;
  color: #fff;
}
.toolbar .btn-cancel { background: rgba(255,255,255,0.15); }
.toolbar .btn-cancel:hover { background: rgba(255,255,255,0.25); }
.toolbar .btn-ok { background: #7c6ef0; }
.toolbar .btn-ok:hover { background: #6b5ce0; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="toolbar" id="toolbar">
  <button class="btn-cancel" id="btnCancel">取消</button>
  <button class="btn-ok" id="btnOk">确定</button>
</div>
<script>
const { ipcRenderer } = require('electron')

const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d')
const toolbar = document.getElementById('toolbar')
const img = new Image()

let startX, startY, endX, endY
let isDrawing = false
let hasSelection = false

ipcRenderer.on('screenshot-data', (_e, dataUrl) => {
  img.onload = () => {
    canvas.width = img.width
    canvas.height = img.height
    drawOverlay()
  }
  img.src = dataUrl
})

function drawOverlay() {
  ctx.drawImage(img, 0, 0)
  ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  if (hasSelection) {
    const x = Math.min(startX, endX)
    const y = Math.min(startY, endY)
    const w = Math.abs(endX - startX)
    const h = Math.abs(endY - startY)
    ctx.clearRect(x, y, w, h)
    ctx.drawImage(img, x, y, w, h, x, y, w, h)
    ctx.strokeStyle = '#7c6ef0'
    ctx.lineWidth = 2
    ctx.strokeRect(x, y, w, h)
  }
}

canvas.addEventListener('mousedown', (e) => {
  startX = e.clientX * window.devicePixelRatio
  startY = e.clientY * window.devicePixelRatio
  isDrawing = true
  hasSelection = false
  toolbar.style.display = 'none'
})

canvas.addEventListener('mousemove', (e) => {
  if (!isDrawing) return
  endX = e.clientX * window.devicePixelRatio
  endY = e.clientY * window.devicePixelRatio
  hasSelection = true
  drawOverlay()
})

canvas.addEventListener('mouseup', (e) => {
  if (!isDrawing) return
  isDrawing = false
  endX = e.clientX * window.devicePixelRatio
  endY = e.clientY * window.devicePixelRatio

  const w = Math.abs(endX - startX)
  const h = Math.abs(endY - startY)
  if (w < 10 || h < 10) {
    hasSelection = false
    drawOverlay()
    return
  }
  hasSelection = true
  drawOverlay()

  const bx = Math.min(startX, endX)
  const by = Math.min(startY, endY)
  toolbar.style.display = 'flex'
  toolbar.style.left = Math.min(bx / window.devicePixelRatio + w / window.devicePixelRatio - toolbar.offsetWidth, window.innerWidth - toolbar.offsetWidth - 8) + 'px'
  toolbar.style.top = Math.min(by / window.devicePixelRatio + h / window.devicePixelRatio + 8, window.innerHeight - toolbar.offsetHeight - 8) + 'px'
})

document.getElementById('btnCancel').addEventListener('click', () => {
  ipcRenderer.send('screenshot-result', null)
})

document.getElementById('btnOk').addEventListener('click', () => {
  const x = Math.min(startX, endX)
  const y = Math.min(startY, endY)
  const w = Math.abs(endX - startX)
  const h = Math.abs(endY - startY)

  const cropCanvas = document.createElement('canvas')
  cropCanvas.width = w
  cropCanvas.height = h
  const cropCtx = cropCanvas.getContext('2d')
  cropCtx.drawImage(img, x, y, w, h, 0, 0, w, h)

  const dataUrl = cropCanvas.toDataURL('image/png')
  ipcRenderer.send('screenshot-result', dataUrl)
})

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    ipcRenderer.send('screenshot-result', null)
  }
})
</script>
</body>
</html>
